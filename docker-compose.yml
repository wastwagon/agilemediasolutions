services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SITE_NAME=${NEXT_PUBLIC_SITE_NAME:-Agile Media Solutions}
        - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:4000}
    container_name: modern_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_NAME=${NEXT_PUBLIC_SITE_NAME:-Agile Media Solutions}
    ports:
      - "${FRONTEND_PORT:-8085}:3000"
    depends_on:
      - backend
    networks:
      - modern_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: modern_backend
    restart: unless-stopped
    environment:
      - PORT=${BACKEND_PORT:-4000}
      - NODE_ENV=production
      - DATABASE_URL=postgres://${POSTGRES_USER:-agile_user}:${POSTGRES_PASSWORD:-agile_password}@postgres:5432/${POSTGRES_DB:-agile_db}
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - JWT_SECRET=${JWT_SECRET:-agile_media_change_me_in_production}
    ports:
      - "${BACKEND_EXT_PORT:-4005}:${BACKEND_PORT:-4000}"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/uploads:/usr/src/app/uploads
    networks:
      - modern_net

  postgres:
    image: postgres:16-alpine
    container_name: modern_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-agile_db}
      - POSTGRES_USER=${POSTGRES_USER:-agile_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-agile_password}
    ports:
      - "${POSTGRES_EXT_PORT:-11200}:5432"
    volumes:
      - modern_postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    networks:
      - modern_net

  redis:
    image: redis:7-alpine
    container_name: modern_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_EXT_PORT:-11201}:6379"
    volumes:
      - modern_redis_data:/data
    networks:
      - modern_net

networks:
  modern_net:
    driver: bridge

volumes:
  modern_postgres_data:
  modern_redis_data:

