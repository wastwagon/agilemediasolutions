name: Verify reserved slugs

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check config ↔ frontend ↔ backend
        run: node scripts/sync-reserved-slugs.js --check
